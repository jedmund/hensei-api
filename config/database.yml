default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  encoding: utf8
  timeout: 5000

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>

development:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL', 'postgres://localhost/hensei_dev') %>

test:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL', 'postgres://localhost/hensei_test') %>
